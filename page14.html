<!DOCTYPE html>
<html>
<head>
<title>This song 🎵</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

<style>
/* 🌙 layout tweak */
.content{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* ✨ softer image */
.photo{
  width:240px;
  border-radius:20px;
  margin:20px 0;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
  filter:brightness(0.95) contrast(1.05);
}

/* ✨ text styling */
.text-block{
  max-width:500px;
  line-height:1.8;
  opacity:0.9;
}

/* ✨ text animation */
.text-block p{
  opacity:0;
  transform:translateY(6px);
  animation:fadeUp 0.35s ease forwards;
}

.text-block p:nth-child(1){animation-delay:0.05s;}
.text-block p:nth-child(2){animation-delay:0.1s;}
.text-block p:nth-child(3){animation-delay:0.15s;}
.text-block p:nth-child(4){animation-delay:0.2s;}
.text-block p:nth-child(5){animation-delay:0.25s;}
.text-block p:nth-child(6){animation-delay:0.3s;}
.text-block p:nth-child(7){animation-delay:0.35s;}
.text-block p:nth-child(8){animation-delay:0.4s;}
.text-block p:nth-child(9){animation-delay:0.45s;}
.text-block p:nth-child(10){animation-delay:0.5s;}

/* ✨ subtle glow */
.title{
  text-shadow:0 0 12px rgba(255,255,255,0.5);
}
</style>

</head>

<body class="page">

<div class="content">

  <h1 class="title">This song 🎵</h1>
  <p class="subtitle">"Just You and I"</p>

  <img src="images/bw-heart.jpg" class="photo">

  <!-- 🎵 hidden audio -->
  <audio id="song" loop autoplay>
    <source src="audio/just you & i.mp3" type="audio/mpeg">
  </audio>

  <div class="text-block">
    <p>This isn’t just a song to me…</p>
    <p>it’s literally us.</p>
    <p>Every line… every word…</p>
    <p>feels like our story.</p>
    <p>The way we stayed…</p>
    <p>the way we fought and came back…</p>
    <p>the way we never really left each other…</p>
    <p>it’s all in that song.</p>
    <p>And every time I hear it…</p>
    <p><b>I think of you ❤️</b></p>
  </div>

  <button class="btn" onclick="next('page15.html')">
    Next →
  </button>

</div>

</body>
</html>
