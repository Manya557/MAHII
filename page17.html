<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letters for Mahi 💌</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">

<script src="script.js" defer></script>
</head>

<body class="page">

<!-- 🌸 BACKGROUND PETALS -->
<div class="petals"></div>

<div class="letter-page">

  <h1 class="main-title">
    Letters for Mahi 💌
  </h1>

  <p class="main-subtitle">
    Open them slowly okay?
  </p>

  <!-- 💌 ENVELOPES -->
  <div class="envelope-grid">

    <div class="env-wrap" onclick="openLetter(1)">
      <img src="images/envelope.png" class="envelope">
      <p>Letter One 🌸</p>
    </div>

    <div class="env-wrap" onclick="openLetter(2)">
      <img src="images/envelope.png" class="envelope">
      <p>Letter Two 🌙</p>
    </div>

    <div class="env-wrap" onclick="openLetter(3)">
      <img src="images/envelope.png" class="envelope">
      <p>Letter Three 💖</p>
    </div>

    <div class="env-wrap" onclick="openLetter(4)">
      <img src="images/envelope.png" class="envelope">
      <p>Last Letter ✨</p>
    </div>

  </div>

</div>

<!-- 💌 LETTER POPUP -->
<div id="letterPopup">

  <div class="paper-wrapper">

    <!-- 📜 CRUMPLED PAPER -->
    <div class="paper">

      <!-- ❌ CLOSE -->
      <button class="close-btn" onclick="closeLetter()">
        ✕
      </button>

      <!-- ✨ TYPEWRITER TEXT -->
      <div id="letterContent"></div>

    </div>

  </div>

</div>

<!-- ⌨️ TYPEWRITER SOUND -->
<audio id="typingSound" src="audio/type.mp3"></audio>

</body>
</html>
