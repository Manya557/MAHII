<!DOCTYPE html>
<html>
<head>
<title>Letters for you 💌</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>

<body class="page">

<div class="letter-page">

<h1 class="title">
Letters for Mahi 💌
</h1>

<p class="subtitle">
Click each envelope slowly...
</p>

<div class="envelope-grid">

  <!-- 💌 Envelope 1 -->
  <div class="env-wrap" onclick="openLetter(1)">
    <img src="images/envelope.png" class="envelope">
    <p>Letter One 🌸</p>
  </div>

  <!-- 💌 Envelope 2 -->
  <div class="env-wrap" onclick="openLetter(2)">
    <img src="images/envelope.png" class="envelope">
    <p>Letter Two 🌙</p>
  </div>

  <!-- 💌 Envelope 3 -->
  <div class="env-wrap" onclick="openLetter(3)">
    <img src="images/envelope.png" class="envelope">
    <p>Letter Three 💖</p>
  </div>

  <!-- 💌 Envelope 4 -->
  <div class="env-wrap" onclick="openLetter(4)">
    <img src="images/envelope.png" class="envelope">
    <p>Last Letter ✨</p>
  </div>

</div>

</div>

<!-- 💌 LETTER POPUP -->
<div id="letterPopup">

  <div class="paper">

    <button class="close-btn" onclick="closeLetter()">
      ✕
    </button>

    <div id="letterContent"></div>

  </div>

</div>

</body>
</html>
