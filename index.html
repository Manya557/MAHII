<!DOCTYPE html>
<html>
<head>
<title>For Mahi 💖</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* 🌸 BACKGROUND */
body{
  margin:0;
  font-family:'Dancing Script', cursive;
  background:linear-gradient(120deg,#fce4ec,#f5e6d3);
}

/* 🌸 CONTAINER */
.pass-container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* 💖 BOX */
.pass-box{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);

  border-radius:25px;
  padding:25px;
  gap:25px;

  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* 📸 POLAROID */
.polaroid{
  background:white;
  padding:12px;
  border-radius:10px;
  transform:rotate(-4deg);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  text-align:center;
}

.polaroid img{
  width:180px;
  border-radius:8px;
}

.polaroid p{
  font-size:14px;
  margin-top:10px;
  color:#444;
}

/* 🔢 KEYPAD */
.keypad{
  text-align:center;
}

/* ✨ TITLE */
.keypad h3{
  font-family:'Great Vibes', cursive;
  font-size:26px;
}

/* ●●● DOTS */
.dots{
  font-size:28px;
  letter-spacing:10px;
  margin-bottom:15px;
  min-height:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,60px);
  gap:12px;
  justify-content:center;
}

/* BUTTON */
.btn-num{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:18px;

  background:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);

  cursor:pointer;
  transition:0.2s;
}

.btn-num:hover{
  transform:scale(1.1);
}

/* HINT */
.hint{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="pass-container">

  <div class="pass-box">

    <!-- 📸 POLAROID -->
    <div class="polaroid">
      <img src="images/road.jpg">

      <p>
        Mi Amore! 💖<br>
        <i>~te amo hasta la luna y de regreso 🌙</i><br>
        ♡😚🧿
      </p>
    </div>

    <!-- 🔢 KEYPAD -->
    <div class="keypad">

      <h3>Enter passcode 💖</h3>

      <div id="dots" class="dots">____</div>

      <div class="grid">
        <button class="btn-num" onclick="press(1)">1</button>
        <button class="btn-num" onclick="press(2)">2</button>
        <button class="btn-num" onclick="press(3)">3</button>
        <button class="btn-num" onclick="press(4)">4</button>
        <button class="btn-num" onclick="press(5)">5</button>
        <button class="btn-num" onclick="press(6)">6</button>
        <button class="btn-num" onclick="press(7)">7</button>
        <button class="btn-num" onclick="press(8)">8</button>
        <button class="btn-num" onclick="press(9)">9</button>
        <button class="btn-num" onclick="reset()">⌫</button>
        <button class="btn-num" onclick="press(0)">0</button>
        <button class="btn-num" onclick="check()">✔</button>
      </div>

      <p class="hint">hint: our dates 💭</p>

    </div>

  </div>

</div>

<script>

let input = "";
let correct = "0514"; // 🔐 CHANGE HERE

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function reset(){
  input = "";
  updateDots();
}

function updateDots(){
  let display = "";
  for(let i=0;i<input.length;i++) display += "● ";
  document.getElementById("dots").innerHTML = display;
}

function check(){
  if(input === correct){

    document.body.style.opacity="0";
    document.body.style.transition="1s";

    setTimeout(()=>{
      window.location.href = "index2.html";
    },1000);

  } else {
    alert("Wrong password 😭");
    reset();
  }
}

</script>

</body>
</html>
